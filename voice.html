  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: black; }

    .voice-page {
      width: 100%;
      height: 100vh;
      position: relative;
      background: black;
      overflow: hidden;
    }

    .voice-panel {
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 99px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
    }

    .voice-topbar {
      width: 100%;
      height: 20px;
      padding: 0 30px;
      position: absolute;
      top: 38px;
      left: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.85);
    }

    .voice-header-fade {
      position: absolute;
      top: 93px;
      left: 0;
      right: 0;
      height: 32px;
      background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0));
      pointer-events: none;
      z-index: 5;
      display: none;
    }

    .voice-selected-label { text-align: center; }

    .voice-selected-count {
      color: black;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      line-height: 16px;
    }

    .voice-selected-text {
      color: black;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      line-height: 22px;
    }

    .voice-clear-btn { cursor: pointer; flex-shrink: 0; }

    .voice-content {
      position: absolute;
      left: 21.5px;
      right: 21.5px;
      top: 93px;
      bottom: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding-bottom: 20px;
    }

    .voice-content::-webkit-scrollbar { display: none; }

    .voice-category {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .voice-category-title {
      color: black;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      line-height: 16px;
    }

    .voice-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .voice-pill {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 6px 3px 3px;
      background: #F4F5F0;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .voice-pill--selected { border: 2px solid black; }

    .voice-pill-img {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      object-fit: cover;
      display: block;
    }

    .voice-pill span {
      color: black;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      line-height: 22px;
    }

    .voice-recent-row {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      height: 46px;
      overflow: hidden;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .voice-recent-row.visible { display: flex; }

    .voice-recent-pill {
      height: 36px;
      padding: 0 13px;
      background: #FFF066;
      border-radius: 10px;
      display: flex;
      align-items: center;
      color: black;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      line-height: 22px;
      cursor: pointer;
    }

    .voice-scroll-btn {
      position: absolute;
      right: 22px;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .voice-bottom {
      width: 100%;
      padding: 0 20px;
      position: absolute;
      bottom: 32px;
      left: 0;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .voice-bottom-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .voice-icon-btn {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .voice-discover-btn {
      flex: 1;
      height: 60px;
      background: #4D4C4C;
      border: none;
      border-radius: 20px;
      color: #A1A09F;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      line-height: 16px;
      cursor: pointer;
    }

    .voice-discover-btn.active {
      background: white;
      color: black;
    }
  </style>

const selected = new Set()

function updateUI() {
  const count = selected.size
  const label = document.getElementById('selectedLabel')
  const countEl = document.getElementById('selectedCount')
  const clearBtn = document.getElementById('clearBtn')
  const topbarCenter = document.getElementById('topbarCenter')
  const topbarRight = document.getElementById('topbarRight')
  const recentRow = document.getElementById('recentRow')
  const discoverBtn = document.getElementById('discoverBtn')

  if (count > 0) {
    label.style.display = 'block'
    countEl.textContent = count
    clearBtn.style.display = 'block'
    topbarCenter.style.display = 'none'
    topbarRight.style.display = 'none'
    recentRow.classList.add('visible')
    discoverBtn.classList.add('active')
  } else {
    label.style.display = 'none'
    clearBtn.style.display = 'none'
    topbarCenter.style.display = 'block'
    topbarRight.style.display = 'block'
    recentRow.classList.remove('visible')
    discoverBtn.classList.remove('active')
  }
}

function toggleItem(key, pillEl) {
  if (selected.has(key)) {
    selected.delete(key)
    pillEl.classList.remove('voice-pill--selected')
  } else {
    selected.add(key)
    pillEl.classList.add('voice-pill--selected')
  }
  updateUI()
}

function clearSelection() {
  selected.clear()
  document.querySelectorAll('.voice-pill--selected').forEach(el => el.classList.remove('voice-pill--selected'))
  updateUI()
}

// Build ingredient list
const content = document.getElementById('voiceContent')
categories.forEach(category => {
  const catEl = document.createElement('div')
  catEl.className = 'voice-category'
  const titleEl = document.createElement('div')
  titleEl.className = 'voice-category-title'
  titleEl.textContent = category.title
  catEl.appendChild(titleEl)
  const pillsEl = document.createElement('div')
  pillsEl.className = 'voice-pills'
  category.items.forEach(item => {
    const key = category.title + item.name
    const pill = document.createElement('div')
    pill.className = 'voice-pill'
    pill.innerHTML = `<img src="${item.img}" alt="${item.name}" class="voice-pill-img"><span>${item.name}</span>`
    pill.addEventListener('click', () => toggleItem(key, pill))
    pillsEl.appendChild(pill)
  })
  catEl.appendChild(pillsEl)
  content.appendChild(catEl)
})

// Scroll drag
function onScrollDragStart(e) {
  e.preventDefault()
  const content = document.getElementById('voiceContent')
  const startY = e.touches ? e.touches[0].clientY : e.clientY
  const startScrollTop = content.scrollTop
  function onMove(ev) {
    ev.preventDefault()
    const currentY = ev.touches ? ev.touches[0].clientY : ev.clientY
    content.scrollTop = startScrollTop + (startY - currentY) * 3
  }
  function onEnd() {
    document.removeEventListener('mousemove', onMove)
    document.removeEventListener('mouseup', onEnd)
    document.removeEventListener('touchmove', onMove)
    document.removeEventListener('touchend', onEnd)
  }
  document.addEventListener('mousemove', onMove)
  document.addEventListener('mouseup', onEnd)
  document.addEventListener('touchmove', onMove, { passive: false })
  document.addEventListener('touchend', onEnd)
}

document.getElementById('scrollBtn').addEventListener('mousedown', onScrollDragStart)
document.getElementById('scrollBtn').addEventListener('touchstart', onScrollDragStart, { passive: false })

// Header fade on scroll
document.getElementById('voiceContent').addEventListener('scroll', function() {
  document.getElementById('headerFade').style.display = this.scrollTop > 0 ? 'block' : 'none'
})
</script>

</body>
